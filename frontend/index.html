  // ============================================================
  // CRM SYNC FUNCTIONS
  // ============================================================
  async function loadCRMSyncStatus() {
    try {
      const response = await fetch('/api/crm/sync-status');
      if (!response.ok) throw new Error('Failed to load sync status');
      
      const data = await response.json();
      const syncData = data.data || {};
      
      // Update status badge
      const statusEl = document.getElementById('crmSyncStatus');
      if (statusEl) {
        const lastSync = syncData.last_sync;
        if (lastSync) {
          const syncDate = new Date(lastSync);
          const now = new Date();
          const diffMinutes = Math.floor((now - syncDate) / 1000 / 60);
          
          let timeAgo = '';
          if (diffMinutes < 1) timeAgo = 'Just now';
          else if (diffMinutes < 60) timeAgo = `${diffMinutes}m ago`;
          else if (diffMinutes < 1440) timeAgo = `${Math.floor(diffMinutes / 60)}h ago`;
          else timeAgo = `${Math.floor(diffMinutes / 1440)}d ago`;
          
          statusEl.textContent = `● Last sync: ${timeAgo}`;
          statusEl.className = 'sg-status connected';
        } else {
          statusEl.textContent = 'Never synced';
          statusEl.className = 'sg-status disconnected';
        }
      }
      
      // Update details section
      const detailsEl = document.getElementById('crmSyncDetails');
      if (detailsEl) {
        const lastSyncFormatted = syncData.last_sync 
          ? new Date(syncData.last_sync).toLocaleString('en-IN', {
              dateStyle: 'medium',
              timeStyle: 'short'
            })
          : 'Never';
        
        detailsEl.innerHTML = `
          <div class="field-row">
            <label class="field-label">Last Sync Time</label>
            <div class="field-value mono">${lastSyncFormatted}</div>
          </div>
          <div class="field-row">
            <label class="field-label">Total Comments</label>
            <div class="field-value"><strong>${syncData.total_count || 0}</strong> comments in database</div>
          </div>
          <div class="field-row">
            <label class="field-label">Processed</label>
            <div class="field-value"><strong style="color: var(--green);">${syncData.processed_count || 0}</strong> comments processed</div>
          </div>
          <div class="field-row">
            <label class="field-label">Pending</label>
            <div class="field-value"><strong style="color: var(--orange);">${syncData.pending_count || 0}</strong> comments pending</div>
          </div>
          <div class="field-row">
            <label class="field-label">Auto-Sync Interval</label>
            <div class="field-value">Every <strong>60 minutes</strong></div>
          </div>
        `;
      }
    } catch (error) {
      console.error('Failed to load CRM sync status:', error);
      const detailsEl = document.getElementById('crmSyncDetails');
      if (detailsEl) {
        detailsEl.innerHTML = `
          <div style="text-align: center; padding: 20px; color: var(--red);">
            ⚠ Failed to load sync status
          </div>
        `;
      }
    }
  }

  async function manualCRMSync() {
    const btn = document.getElementById('btnManualSync');
    if (!btn) return;
    
    const originalHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> Syncing...';
    
    try {
      const response = await fetch('/api/crm/sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      });
      
      if (!response.ok) {
        const error = await response.text();
        throw new Error(error);
      }
      
      const result = await response.json();
      const newComments = result.data?.new_comments || 0;
      
      alert(`✅ Sync completed!\n\n${newComments} new comments fetched from CRM.`);
      
      // Reload sync status
      await loadCRMSyncStatus();
      
      // Reload conversations to show new data
      await loadData();
      render();
      
    } catch (error) {
      console.error('Sync failed:', error);
      alert(`❌ Sync failed:\n\n${error.message}`);
    } finally {
      btn.disabled = false;
      btn.innerHTML = originalHTML;
    }
  }

  // ============================================================
  // TAB MANAGEMENT
  // ============================================================
  function render() {
    document.querySelectorAll('.seg-btn').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === activeTab);
    });
    ['Dash', 'Inbox', 'CC', 'Settings', 'AITraining'].forEach(v => {
      const id = v === 'Dash' ? 'viewDash' : v === 'CC' ? 'viewCC' : v === 'AITraining' ? 'viewAITraining' : 'view' + v;
      const tabId = v === 'Dash' ? 'dash' : v === 'CC' ? 'cc' : v === 'AITraining' ? 'ai-training' : v.toLowerCase();
      document.getElementById(id).classList.toggle('active', activeTab === tabId);
    });

    const ccItems = conversations.filter(c => c.handler === 'escalated' || c.handler === 'approval').length;
    const ccBadge = document.getElementById('ccBadge');
    ccBadge.textContent = ccItems;
    ccBadge.style.display = ccItems > 0 ? 'inline-flex' : 'none';

    if (activeTab === 'dash') renderDashboard();
    else if (activeTab === 'inbox') { renderSidebar(); renderChatPane(); }
    else if (activeTab === 'cc') renderCommandCentre();
    else if (activeTab === 'settings') {
      renderSettings();
      // Load CRM sync status after rendering
      loadCRMSyncStatus();
    }
    else if (activeTab === 'ai-training') {
      renderAITraining();
    }
  }

  (async function init() {
    await loadData();
    await loadReps();  // Load reps for dropdown and filters
    if (conversations.length > 0) activeConvId = conversations[0].id;
    render();
  })();

  // ============================================================
  // Rep Selector and Pagination
  // ============================================================
  let allReps = [];
  let repTypes = [];
  let currentFilters = {
    rep_type: '',
    rep_id: '',
    handler: '',
    limit: 100,
    offset: 0
  };

  async function loadReps() {
    try {
      console.log("Loading reps...");
      const response = await fetch('/api/reps');
      if (response.ok) {
        allReps = await response.json();
        console.log("Loaded reps:", allReps.length);
        populateRepSelector(allReps);
      } else {
        console.error("Failed to fetch reps:", response.status);
      }
      
      const typesResponse = await fetch('/api/reps/types');
      if (typesResponse.ok) {
        const data = await typesResponse.json();
        repTypes = data.types || [];
        console.log("Loaded rep types:", repTypes);
        updateCategoryFilters();
      } else {
        console.error("Failed to fetch rep types:", typesResponse.status);
      }
    } catch (e) {
      console.error("Failed to load reps:", e);
    }
  }

  function populateRepSelector(reps) {
    const selector = document.getElementById('rep-selector');
    if (!selector) {
      console.error("Rep selector not found!");
      return;
    }
    
    console.log("Populating rep selector with", reps.length, "reps");
    selector.innerHTML = '<option value="">All Representatives</option>';
    
    if (!reps || reps.length === 0) {
      console.warn("No reps to populate");
      return;
    }
    
    const byType = {};
    reps.forEach(rep => {
      const type = rep.rep_type || 'unknown';
      if (!byType[type]) byType[type] = [];
      byType[type].push(rep);
    });
    
    Object.keys(byType).sort().forEach(type => {
      const optgroup = document.createElement('optgroup');
      optgroup.label = type.toUpperCase();
      
      byType[type].sort((a, b) => a.name.localeCompare(b.name)).forEach(rep => {
        const option = document.createElement('option');
        option.value = rep.id;
        option.textContent = `${rep.name} (${rep.conversation_count || 0})`;
        option.setAttribute('data-count', rep.conversation_count || 0);
        option.setAttribute('data-type', type);
        optgroup.appendChild(option);
      });
      
      selector.appendChild(optgroup);
    });
    
    console.log("Rep selector populated successfully");
  }

  function updateCategoryFilters() {
    const container = document.getElementById('category-filters');
    if (!container) {
      console.error("Category filters container not found!");
      return;
    }
    
    console.log("Updating category filters with", repTypes.length, "types");
    container.innerHTML = '<button class="chip active" data-rep-type="" onclick="filterByRepType(\'\')">All</button>';
    
    if (!repTypes || repTypes.length === 0) {
      console.warn("No rep types to display");
      return;
    }
    
    repTypes.forEach(type => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.dataset.repType = type.type;
      const typeName = type.type.charAt(0).toUpperCase() + type.type.slice(1);
      btn.textContent = `${typeName} (${type.conversation_count || 0})`;
      btn.onclick = () => filterByRepType(type.type);
      container.appendChild(btn);
    });
    
    console.log("Category filters updated successfully");
  }

  function filterByRepType(repType) {
    console.log("Filtering by rep type:", repType);
    currentFilters.rep_type = repType;
    currentFilters.rep_id = '';
    currentFilters.offset = 0;
    
    // Update active chip
    document.querySelectorAll('#category-filters .chip').forEach(chip => {
      const chipType = chip.dataset.repType || '';
      chip.classList.toggle('active', chipType === repType);
    });
    
    // Filter reps in dropdown
    if (repType) {
      const filteredReps = allReps.filter(r => {
        // Check both rep_type and type fields
        const type = r.rep_type || r.type || '';
        return type.toLowerCase() === repType.toLowerCase();
      });
      console.log("Filtered reps:", filteredReps.length, "from", allReps.length, "total");
      if (filteredReps.length === 0) {
        console.warn("No reps found for type:", repType, "Available types:", 
          [...new Set(allReps.map(r => r.rep_type || r.type))]);
      }
      populateRepSelector(filteredReps);
    } else {
      console.log("Showing all reps:", allReps.length);
      populateRepSelector(allReps);
    }
    
    // Reset rep selector
    const selector = document.getElementById('rep-selector');
    if (selector) selector.value = '';
    
    // Load conversations
    loadConversationsWithFilters();
  }

  function filterByRep(repId) {
    console.log("Filtering by rep:", repId);
    currentFilters.rep_id = repId;
    currentFilters.offset = 0;
    loadConversationsWithFilters();
  }

  
  
  // Search reps by name
  function searchReps(query) {
    const selector = document.getElementById('rep-selector');
    if (!selector) return;
    
    const options = selector.querySelectorAll('option');
    const lowerQuery = query.toLowerCase();
    
    options.forEach(option => {
      if (option.value === '') {
        option.style.display = ''; // Always show "All Representatives"
        return;
      }
      
      const text = option.textContent.toLowerCase();
      if (text.includes(lowerQuery)) {
        option.style.display = '';
      } else {
        option.style.display = 'none';
      }
    });
    
    console.log("Filtered rep options by:", query);
  }

  
  // Select a conversation
  function selectConversation(convId) {
    activeConvId = convId;
    activeTab = 'inbox';
    console.log("Selected conversation:", convId);
    renderInbox(); // Re-render to update active state
    renderChatPane(); // Render the conversation details
  }

  // Render inbox conversation list
  function renderInbox() {
    const convList = document.getElementById('convList');
    if (!convList) {
      console.error("Conversation list element not found!");
      return;
    }
    
    console.log("Rendering inbox with", conversations.length, "conversations");
    
    if (conversations.length === 0) {
      convList.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-3);">No conversations found</div>';
      return;
    }
    
    // Clear existing
    convList.innerHTML = '';
    
    // Render each conversation
    conversations.forEach(conv => {
      const item = document.createElement('div');
      item.className = 'conv-item';
      if (activeConvId === conv.id) item.classList.add('active');
      
      const rep = settings.team[conv.rep_id] || {};
      const customer = conv.customer_name || conv.topic || 'Unknown';
      const lastMsg = conv.messages && conv.messages.length > 0 
        ? conv.messages[conv.messages.length - 1] 
        : null;
      
      item.innerHTML = `
        <div class="rep-avatar" style="background: ${rep.color || '#007AFF'}; color: #fff;">
          ${rep.avatar || '?'}
        </div>
        <div class="conv-info">
          <div class="conv-line1">
            <span class="conv-rep-name">${rep.name || 'Unknown'}</span>
            <span class="conv-time">${conv.updated_at || 'now'}</span>
          </div>
          <div class="conv-customer">${customer}</div>
          <div class="conv-preview">${lastMsg ? lastMsg.text.substring(0, 60) + '...' : 'No messages'}</div>
        </div>
        <div class="conv-badges">
          <span class="pill ${conv.handler}">${conv.handler || 'ai'}</span>
        </div>
      `;
      
      item.onclick = () => selectConversation(conv.id);
      convList.appendChild(item);
    });
    
    console.log("Inbox rendered successfully");
  }

  async function loadConversationsWithFilters() {
    try {
      const params = new URLSearchParams();
      
      if (currentFilters.rep_id) {
        params.append('rep_id', currentFilters.rep_id);
      } else if (currentFilters.rep_type) {
        params.append('rep_type', currentFilters.rep_type);
      }
      
      if (currentFilters.handler && currentFilters.handler !== 'all') {
        params.append('handler', currentFilters.handler);
      }
      
      params.append('limit', 100);
      params.append('offset', currentFilters.offset);
      
      const response = await fetch(`/api/conversations?${params}`);
      if (response.ok) {
        const rawConvs = await response.json();
        conversations = rawConvs.map(c => ({
          ...c,
          senior_assigned: c.senior_assigned_id,
          fresh: c.is_fresh,
          messages: (c.messages || []).map(m => ({
            ...m,
            from: m.from_who,
            date: m.date_label,
            read: m.is_read
          }))
        }));
        
        // Sort by updated_at (most recent first)
        conversations.sort((a, b) => {
          const dateA = new Date(a.updated_at || 0);
          const dateB = new Date(b.updated_at || 0);
          return dateB - dateA;
        });
        
        console.log("Conversations sorted by date");
        
        renderInbox();
        updatePaginationControls();
      }
    } catch (e) {
      console.error("Failed to load conversations:", e);
    }
  }

  function goToPreviousPage() {
    if (currentFilters.offset > 0) {
      currentFilters.offset -= 100;
      console.log("Going to previous page, offset:", currentFilters.offset);
      loadConversationsWithFilters();
    }
  }

  function goToNextPage() {
    currentFilters.offset += 100;
    console.log("Going to next page, offset:", currentFilters.offset);
    loadConversationsWithFilters();
  }

  function updatePaginationControls() {
    const prevBtn = document.getElementById('prev-page');
    const nextBtn = document.getElementById('next-page');
    const pageStart = document.getElementById('page-start');
    const pageEnd = document.getElementById('page-end');
    const totalCount = document.getElementById('total-count');
    
    if (!prevBtn || !nextBtn) return;
    
    const limit = 100;
    if (pageStart) pageStart.textContent = currentFilters.offset + 1;
    if (pageEnd) pageEnd.textContent = Math.min(
      currentFilters.offset + limit,
      currentFilters.offset + conversations.length
    );
    if (totalCount) totalCount.textContent = '9,993';
    
    prevBtn.disabled = currentFilters.offset === 0;
    nextBtn.disabled = conversations.length < limit;
    
    console.log("Pagination updated:", {
      offset: currentFilters.offset,
      showing: conversations.length,
      prevDisabled: prevBtn.disabled,
      nextDisabled: nextBtn.disabled
    });
  }

  // Override the original setFilter to use new system
  const originalSetFilter = setFilter;
  setFilter = function(f) {
    activeFilter = f;
    currentFilters.handler = f === 'all' ? '' : f;
    currentFilters.offset = 0;
    
    document.querySelectorAll('#filterChips .chip').forEach(c => c.classList.remove('active'));
    const chip = document.querySelector(`#filterChips .chip[data-filter="${f}"]`);
    if (chip) chip.classList.add('active');
    
    loadConversationsWithFilters();
  };

  // Enhance loadData to load reps first
  const originalLoadData = loadData;
  loadData = async function() {
    try {
      // Load team and seniors first
      const teamRes = await fetch('/api/settings/team');
      if (teamRes.ok) {
        const teamArr = await teamRes.json();
        settings.team = {};
        teamArr.forEach(r => { settings.team[r.id] = r; });
      }

      const seniorsRes = await fetch('/api/settings/seniors');
      if (seniorsRes.ok) {
        const seniorsArr = await seniorsRes.json();
        settings.seniors = {};
        seniorsArr.forEach(s => { settings.seniors[s.id] = s; });
      }

      // Load reps for selector
      await loadReps();

      // Load conversations with filters
      await loadConversationsWithFilters();
      
      renderDash();
      renderInbox();
      renderCommand();
      renderSettings();
    } catch (e) {
      console.error("Backend fetch failed", e);
      // Fallback to original
      await originalLoadData();
    }
  };
